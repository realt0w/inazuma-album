<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inazuma Eleven Cross - Album</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="is-booting">
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="sectionEyebrow">Album joueurs</p>
          <h1>Inazuma Eleven Cross</h1>
        </div>
        <div class="mode-tabs" role="tablist" aria-label="Sections de l'album">
          <button class="mode-tab is-active" type="button" data-mode="players">Joueurs</button>
          <button class="mode-tab" type="button" data-mode="simulator">Simulateur</button>
          <button class="mode-tab" type="button" data-mode="collection">Collection</button>
        </div>
        <div class="topbar-actions">
          <div class="db-meta" id="dbMeta">Chargement...</div>
          <button id="authOpenButton" class="auth-button" type="button">
            <span class="auth-avatar" aria-hidden="true"></span>
            <span id="authButtonLabel">Login / Register</span>
          </button>
        </div>
      </header>

      <section class="filters" aria-label="Filtres">
        <label class="search-box">
          <span>Recherche</span>
          <input id="searchInput" type="search" autocomplete="off" placeholder="Nom, équipe, technique..." />
        </label>
        <label class="player-filter">
          <span>Équipe</span>
          <select id="teamFilter"></select>
        </label>
        <label class="player-filter">
          <span>Poste</span>
          <select id="positionFilter"></select>
        </label>
        <label class="player-filter">
          <span>Élément</span>
          <select id="elementFilter"></select>
        </label>
        <label class="player-filter">
          <span>Style</span>
          <select id="styleFilter"></select>
        </label>
        <label class="player-filter">
          <span>Saison</span>
          <select id="seasonFilter"></select>
        </label>
        <label>
          <span>Tri</span>
          <select id="sortSelect">
            <option value="name_asc">Nom</option>
            <option value="power_desc">Puissance</option>
            <option value="rarity_desc">Étoiles</option>
          </select>
        </label>
      </section>

      <section class="workspace">
        <aside class="album-panel" aria-label="Liste des joueurs">
          <div class="album-head">
            <div>
              <strong id="resultCount">0 joueur</strong>
              <span id="albumSubhead">Lv.300 / éveil max / équipement Lv.1</span>
            </div>
            <button id="playableToggle" class="toggle-button" type="button" aria-pressed="false">
              <span>Tous</span>
              <span class="toggle-track" aria-hidden="true"><span class="toggle-thumb"></span></span>
            </button>
          </div>
          <div id="playerGrid" class="player-grid"></div>
        </aside>

        <article id="playerDetail" class="detail" aria-live="polite"></article>
      </section>
    </main>

    <template id="emptyTemplate">
      <div class="empty-state">
        <h2>Aucun joueur</h2>
        <p>Aucun résultat pour ces filtres.</p>
      </div>
    </template>

    <div id="skillModal" class="skill-modal" hidden role="dialog" aria-modal="true" aria-labelledby="skillModalTitle">
      <div class="skill-modal-window">
        <button id="skillModalClose" class="modal-close" type="button" aria-label="Fermer">×</button>
        <div id="skillModalBody"></div>
      </div>
    </div>

    <div id="authModal" class="auth-modal" hidden role="dialog" aria-modal="true" aria-labelledby="authModalTitle">
      <div class="auth-modal-window">
        <button id="authModalClose" class="modal-close" type="button" aria-label="Fermer">×</button>
        <div id="authModalBody"></div>
      </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
